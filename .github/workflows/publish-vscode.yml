name: Publish VSCode Extension

# Publishes packages/vscode-regexcss to the VS Code Marketplace and Open VSX.
# Trigger by pushing a tag like `vscode-v0.0.1` (must match the extension's
# package.json version), or run manually from the Actions tab.
#
# `build` produces and tests the .vsix and uploads it as an artifact; `publish`
# downloads that artifact and pushes it to both registries.
#
# Required repository secrets:
#   VSCE_PAT  — Azure DevOps PAT (Marketplace > Manage, all accessible orgs)
#   OVSX_PAT  — open-vsx.org access token
# One-time: create the Open VSX namespace to match the publisher, e.g.
#   npx ovsx create-namespace stromatolite -p <OVSX_PAT>

on:
  push:
    tags:
      - "vscode-v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: publish-vscode-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      vsix: ${{ steps.meta.outputs.vsix }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve version
        id: meta
        run: |
          version="$(node -p "require('./packages/vscode-regexcss/package.json').version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "vsix=vscode-regexcss-$version.vsix" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          tag="${GITHUB_REF_NAME#vscode-v}"
          if [ "$tag" != "${{ steps.meta.outputs.version }}" ]; then
            echo "::error::tag vscode-v$tag does not match package.json version ${{ steps.meta.outputs.version }}"
            exit 1
          fi

      - name: Build regexcss core
        run: pnpm --filter regexcss build

      - name: Test extension
        run: pnpm exec vp test --run packages/vscode-regexcss

      - name: Package extension
        run: pnpm --filter vscode-regexcss package

      - name: Upload .vsix artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: vscode-regexcss-${{ steps.meta.outputs.version }}
          path: packages/vscode-regexcss/${{ steps.meta.outputs.vsix }}
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm

      # Install so the pinned vsce / ovsx CLIs are available (deps only, no build).
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download .vsix artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: vscode-regexcss-${{ needs.build.outputs.version }}
          path: packages/vscode-regexcss

      - name: Publish to VS Code Marketplace
        working-directory: packages/vscode-regexcss
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: pnpm exec vsce publish --packagePath "${{ needs.build.outputs.vsix }}"

      - name: Publish to Open VSX
        working-directory: packages/vscode-regexcss
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: pnpm exec ovsx publish "${{ needs.build.outputs.vsix }}" -p "$OVSX_PAT"
